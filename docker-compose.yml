x-pete-build: &pete-build
  context: .
  dockerfile: docker/pete/Dockerfile

x-pete-env: &pete-env
  RUST_LOG: ${RUST_LOG:-info}

x-pete-volumes: &pete-volumes
  - ./models:/app/models:ro
  - ./movies:/app/movies
  - /tmp:/tmp
  - /etc/timezone:/etc/timezone:ro

x-pete-component: &pete-component
  profiles: ["pete"]
  network_mode: host
  init: true
  env_file:
    - path: ./.env
      required: false
  environment:
    <<: *pete-env
  volumes: *pete-volumes

services:
  nginx:
    build:
      context: ./docker/nginx
    network_mode: host
    environment:
      PETE_TLS_PORT_3000: ${PETE_TLS_PORT_3000:-3443}
      PETE_TLS_PORT_3001: ${PETE_TLS_PORT_3001:-3444}
      PETE_UPSTREAM_3000: ${PETE_UPSTREAM_3000:-127.0.0.1:3000}
      PETE_UPSTREAM_3001: ${PETE_UPSTREAM_3001:-127.0.0.1:3001}
      PETE_TLS_CERT: /etc/nginx/self-signed/localhost.crt
      PETE_TLS_KEY: /etc/nginx/self-signed/localhost.key
      PETE_TLS_COMMON_NAME: ${PETE_TLS_COMMON_NAME:-localhost}
    volumes:
      - nginx_certs:/etc/nginx/self-signed
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 30s
      timeout: 5s
      retries: 3

  tts:
    image: ghcr.io/coqui-ai/tts
    ports:
      - "5002:5002"
    entrypoint: python3
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - COQUI_TOS_AGREED=1
      - TTS_MODEL="tts_models/en/ljspeech/tacotron2-DDC"
      - VOCODER_MODEL="vocoder_models/en/ljspeech/hifigan_v1"
    command: [ "TTS/server/server.py", "--model_name", "tts_models/en/vctk/vits" ]
    volumes:
      - ./tts:/root/.local/share
      - /etc/timezone:/etc/timezone:ro

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5
    ports:
      - "7687:7687"
      - "7474:7474"
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - ./neo4j_data:/data

  face:
    <<: *pete-component
    image: daringsby/pete-face:latest
    build:
      <<: *pete-build
      args:
        PETE_BIN: face

  psychic:
    <<: *pete-component
    image: daringsby/pete-psychic:latest
    build:
      <<: *pete-build
      args:
        PETE_BIN: psychic

  transcription:
    <<: *pete-component
    image: daringsby/pete-transcription:latest
    build:
      <<: *pete-build
      args:
        PETE_BIN: transcription
    environment:
      <<: *pete-env
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    gpus: all

  frecog:
    <<: *pete-component
    image: daringsby/pete-frecog:latest
    build:
      <<: *pete-build
      args:
        PETE_BIN: frecog

  vrecog:
    <<: *pete-component
    image: daringsby/pete-vrecog:latest
    build:
      <<: *pete-build
      args:
        PETE_BIN: vrecog

  locate:
    <<: *pete-component
    image: daringsby/pete-locate:latest
    build:
      <<: *pete-build
      args:
        PETE_BIN: locate

  scene_vec:
    <<: *pete-component
    image: daringsby/pete-scene-vec:latest
    build:
      <<: *pete-build
      args:
        PETE_BIN: scene_vec

  image_desc:
    <<: *pete-component
    image: daringsby/pete-image-desc:latest
    build:
      <<: *pete-build
      args:
        PETE_BIN: image_desc

  combobulate:
    <<: *pete-component
    image: daringsby/pete-combobulate:latest
    build:
      <<: *pete-build
      args:
        PETE_BIN: combobulate

  will:
    <<: *pete-component
    image: daringsby/pete-will:latest
    build:
      <<: *pete-build
      args:
        PETE_BIN: will

  remember:
    <<: *pete-component
    image: daringsby/pete-remember:latest
    build:
      <<: *pete-build
      args:
        PETE_BIN: remember

  conversant:
    <<: *pete-component
    image: daringsby/pete-conversant:latest
    build:
      <<: *pete-build
      args:
        PETE_BIN: conversant

  cluster:
    <<: *pete-component
    profiles: ["cluster"]
    image: daringsby/pete-cluster:latest
    build:
      <<: *pete-build
      args:
        PETE_BIN: cluster

  forget-silence:
    <<: *pete-component
    image: daringsby/pete-forget-silence:latest
    build:
      <<: *pete-build
      args:
        PETE_BIN: forget-silence

volumes:
  nginx_certs:
